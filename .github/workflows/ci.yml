name: CI

on:
  push:
    branches: [ main ] # Or your default branch
  pull_request:
    branches: [ main ] # Or your default branch

jobs:
  lint_test_build:
    # This archived repository only runs validation. It must not version or
    # publish packages from pull requests.
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changeset versioning

      - name: Validate archive project manifest
        run: python3 -m json.tool .doctrine/project.json >/dev/null

      - name: Check markdown and workflow diff whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
          else
            git show --check --format= HEAD
          fi

      - name: Assert archive ADR naming
        run: test -z "$(find docs/adr -name 'ADR-DRAFT-*' -print -quit)"
